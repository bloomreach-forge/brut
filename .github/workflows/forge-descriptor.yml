name: Update Forge Descriptor

on:
  push:
    branches: [develop]
    paths:
      - README.md
      - .forge/**
  workflow_dispatch:

jobs:
  descriptor:
    permissions:
      contents: write
    uses: bloomreach-forge/ci-workflows/.github/workflows/forge-descriptor.yml@v1.0.4
    with:
      config-path: .forge/addon-config.yaml
      output-path: forge-addon.yaml
      readme-path: README.md
    secrets: inherit
